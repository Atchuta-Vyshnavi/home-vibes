<!DOCTYPE html>
<html>
<head>
<title>Select Payment Method</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to right, #ff6a6a, #f7b267);
  font-family: Arial;
}

.container {
  background: #eee;
  width: 350px;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 20px;
}

h3 {
  margin-top: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  color: white;
}

/* Gradient buttons like your thumbnail */
.upi {
  background: linear-gradient(to right, #ff6a6a, #f7b267);
}

.cod {
  background: linear-gradient(to right, #ff6a6a, #f7b267);
}

button:hover {
  opacity: 0.9;
}

#message {
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
  <h2>Select Payment Method</h2>

  <!-- UPI Section -->
  <h3>UPI Payment</h3>
  <input type="text" id="upiId" placeholder="Enter UPI ID (example@upi)">
  <button class="upi" onclick="payUPI()">Pay via UPI</button>

  <!-- COD Section -->
  <h3>Cash on Delivery</h3>
  <button class="cod" onclick="payCOD()">Place Order (COD)</button>

  <p id="message"></p>
</div>

<script>
function payUPI() {
  const upi = document.getElementById("upiId").value;
  const message = document.getElementById("message");

  if(upi === "") {
    message.innerText = "Please enter valid UPI ID!";
    message.style.color = "red";
  } else {
    message.innerText = "Payment Successful via UPI ✅";
    message.style.color = "green";
  }
}

function payCOD() {
  const message = document.getElementById("message");
  message.innerText = "Order Placed Successfully (Cash on Delivery) 🚚";
  message.style.color = "green";
}
</script>

</body>
</html>
