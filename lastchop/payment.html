<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HomeVibes— Payment</title>
<style>
  body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #ff6f61, #ffcc70);
    color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .payment-card {
    background: rgba(255,255,255,0.9);
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 400px;
    padding: 24px;
    text-align: center;
  }
  img {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    border-radius: 12px;
  }
  h2 { margin: 12px 0 4px 0; }
  .price {
    color: #ff6f61;
    font-weight: 900;
    font-size: 18px;
    margin-bottom: 10px;
  }
  .qty { color: #555; margin-bottom: 16px; }
  .btn {
    display: block;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn.pay {
    background: linear-gradient(90deg, #ff6f61, #ffcc70);
    color: white;
  }
  .btn.cancel {
    margin-top: 10px;
    background: #eee;
  }
</style>
</head>
<body>
  <div class="payment-card">
    <img id="payThumb" src="" alt="Thumbnail">
    <h2 id="payTitle">Loading…</h2>
    <div class="qty" id="payQty">Qty: —</div>
    <div class="price" id="payTotal">Total: ₹—</div>

    <button class="btn pay" id="payNowBtn">Pay Now</button>
    <button class="btn cancel" onclick="window.location.href='home.html'">Cancel</button>
  </div>

<script>
  const data = JSON.parse(localStorage.getItem("purchaseData"));
  if (data) {
    document.getElementById("payThumb").src = data.thumbnail;
    document.getElementById("payTitle").textContent = data.title;
    document.getElementById("payQty").textContent = "Quantity: " + data.qty;
    document.getElementById("payTotal").textContent = "Total: ₹" + data.total;
  }

  document.getElementById("payNowBtn").addEventListener("click", () => {
    alert(`✅ Payment successful! You bought ${data.qty} x ${data.title} for ₹${data.total}`);
    localStorage.removeItem("purchaseData");
    window.location.href = "home.html";
  });
</script>
</body>
</html>
