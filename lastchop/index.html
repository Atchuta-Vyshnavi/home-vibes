<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chop-Chow | Login & Signup</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #ff6f61, #ffcc70);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #fff;
      width: 400px;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
      transition: 0.3s;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .tabs button {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: #eee;
      color: #333;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .tabs button.active {
      background: #ff6f61;
      color: white;
      border-radius: 5px;
    }

    form {
      display: none;
      flex-direction: column;
    }

    form.active {
      display: flex;
    }

    label {
      font-weight: 500;
      margin-top: 10px;
    }

    input {
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    button.submit {
      margin-top: 20px;
      padding: 10px;
      border: none;
      background: #ff6f61;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button.submit:hover {
      background: #ff3b2e;
    }

    .logo {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      color: #ff6f61;
      margin-bottom: 20px;
    }

    @media (max-width: 480px) {
      .container {
        width: 90%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Chop-Chow 🍴</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('login')">Login</button>
      <button class="tab-btn" onclick="showTab('signup')">Signup</button>
    </div>

    <!-- Login Form -->
    <form id="login" class="active" onsubmit="return loginUser(event)">
      <label>Email:</label>
      <input type="email" id="loginEmail" required />

      <label>Password:</label>
      <input type="password" id="loginPassword" required />

      <button class="submit" type="submit">Login</button>
    </form>

    <!-- Signup Form -->
    <form id="signup" onsubmit="return registerUser(event)">
      <label>Name:</label>
      <input type="text" id="signupName" required />

      <label>Date of Birth:</label>
      <input type="date" id="signupDob" required />

      <label>Email:</label>
      <input type="email" id="signupEmail" required />

      <label>Password:</label>
      <input type="password" id="signupPassword" required />

      <button class="submit" type="submit">Signup</button>
    </form>
  </div>

  <script>
    function showTab(tab) {
      document.querySelectorAll("form").forEach(f => f.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById(tab).classList.add("active");
      event.target.classList.add("active");
    }

    function registerUser(e) {
      e.preventDefault();
      const name = document.getElementById("signupName").value;
      const dob = document.getElementById("signupDob").value;
      const email = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPassword").value;

      // Save user info in localStorage
      const user = { name, dob, email, password };
      localStorage.setItem("user", JSON.stringify(user));

      alert("Signup successful! Please login.");
      showTab('login');
    }

    function loginUser(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const storedUser = JSON.parse(localStorage.getItem("user"));

      if (storedUser && storedUser.email === email && storedUser.password === password) {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "home.html";
      } else {
        alert("Invalid email or password!");
      }
    }
  </script>
</body>
</html>
