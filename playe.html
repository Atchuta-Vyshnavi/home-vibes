<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HomeVibes — Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/playe.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo" onclick="goHome()">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="2" x2="8" y2="12"/><path d="M5 2v4a3 3 0 0 0 6 0V2"/><line x1="8" y1="12" x2="8" y2="22"/>
        <line x1="16" y1="2" x2="16" y2="22"/>
      </svg>
    </div>
    <span class="logo-text">HomeVibes</span>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="goHome()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </button>
    <!-- <button class="nav-btn primary" onclick="goCart()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      Cart
    </button> -->
    <button class="nav-btn primary" onclick="goCart()">
  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
    <path d="M16 10a4 4 0 0 1-8 0"/>
  </svg>
  Cart
  <span class="cart-badge" id="cartCount" style="display:none">0</span>
</button>
  </div>
</nav>

<!-- MAIN -->
<div class="page-wrap">

  <!-- Video -->
  <div class="video-card">
    <video id="videoPlayer" controls autoplay></video>
  </div>

  <!-- Dish Header -->
  <div class="dish-header">
    <div class="dish-header-left">
      <h2 id="videoTitle">—</h2>
      <p id="videoDesc">—</p>
    </div>
    <div class="dish-total-badge" id="totalBadge">₹0.00</div>
  </div>

  <!-- Ingredients -->
  <div class="section-card">
    <div class="section-label">Ingredients Required</div>
    <div id="ingredientsList"></div>
  </div>

  <!-- Cost Breakdown -->
  <div class="section-card">
    <div class="section-label">Cost Breakdown</div>
    <div id="costSummary"></div>

    <div class="action-row">
      <button class="action-btn btn-cart" onclick="addToCart()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        Add to Cart
      </button>
      <button class="action-btn btn-buy" onclick="buyNow()">
        Buynow→
      </button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/playe.js"></script>

</body>
</html>
