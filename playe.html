<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HomeVibes — Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent1:#ff6f61;
  --accent2:#ffcc70;
  --panel-bg: rgba(255,255,255,0.96);
  --muted:#555;
}
html,body{
  min-height:100%; margin:0;
  background: linear-gradient(135deg,var(--accent1),var(--accent2));
  font-family:"Poppins",sans-serif;
}
.navbar{
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 24px;
  background: linear-gradient(135deg,var(--accent1),var(--accent2));
  color:white;
}
.navbar h1{ margin:0; font-size:24px; letter-spacing:1px; }
.navbar .menu{ display:flex; gap:20px; align-items:center; }
.navbar .menu div{ cursor:pointer; font-weight:500; }
.navbar .menu div:hover{ text-decoration:underline; }

.video-container{
  display:flex; flex-direction:column;
  align-items:center; padding:30px;
}
video{
  width:80%; max-width:800px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
  margin-bottom:15px;
}
.details{
  background: var(--panel-bg);
  border-radius:12px; padding:24px;
  width:80%; max-width:800px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.details h2{ margin-top:0; color:var(--accent1); text-align:center; }
.details .desc{ color:var(--muted); margin-bottom:18px; font-size:15px; text-align:center; }

.ingredients-title{
  font-size:17px; font-weight:700; color:var(--accent1);
  margin-bottom:14px;
  border-bottom:2px solid var(--accent2); padding-bottom:6px;
}
.ingredients-list{ display:flex; flex-direction:column; gap:10px; }

.ingredient-row{
  display:flex; align-items:center; justify-content:space-between;
  background:#fff7f0; border:1px solid #ffe0d0;
  border-radius:10px; padding:10px 14px; gap:8px;
}
.ingredient-name{ flex:1; font-weight:500; color:#333; font-size:14px; }
.ingredient-unit{ color:#999; font-size:12px; margin-top:2px; }
.ingredient-cost{ color:var(--accent1); font-size:13px; font-weight:600; min-width:55px; text-align:right; }

.qty-control{ display:flex; align-items:center; gap:8px; }
.qty-control button{
  background:var(--accent1); color:white; border:none;
  width:28px; height:28px; border-radius:6px; cursor:pointer;
  font-size:16px; font-weight:700; padding:0; margin:0;
  transition:background 0.2s; display:flex; align-items:center; justify-content:center;
}
.qty-control button:hover{ background:#e05b50; }
.qty-control .qty-value{ min-width:34px; text-align:center; font-weight:600; font-size:14px; color:#333; }

/* Cost Summary Box */
.cost-summary{
  margin-top:20px;
  background:linear-gradient(135deg,#fff3ef,#fff9ec);
  border:2px solid var(--accent2);
  border-radius:12px; padding:16px 20px;
}
.cost-summary-title{
  font-size:15px; font-weight:700; color:var(--accent1);
  margin-bottom:10px; border-bottom:1px solid #ffe0d0; padding-bottom:6px;
}
.cost-row{
  display:flex; justify-content:space-between; align-items:center;
  font-size:13px; color:var(--muted); padding:4px 0;
}
.cost-row.total-row{
  border-top:2px solid var(--accent2); margin-top:8px; padding-top:10px;
  font-size:17px; font-weight:700; color:#222;
}
.cost-row.total-row span:last-child{ color:var(--accent1); font-size:19px; }

.action-buttons{ margin-top:20px; display:flex; justify-content:center; gap:12px; }
button.main-btn{
  background:var(--accent1); color:white; border:none;
  padding:11px 30px; border-radius:8px; cursor:pointer;
  font-weight:600; font-size:15px; margin:0; transition:0.3s;
}
button.main-btn:hover{ background:#e05b50; }

.toast{
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:#222; color:#fff; padding:12px 24px;
  border-radius:10px; font-size:14px; font-weight:500;
  opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999;
  white-space:nowrap;
}
.toast.show{ opacity:1; }
</style>
</head>
<body>
  <div class="navbar">
    <h1>🍴 HomeVibes</h1>
    <div class="menu">
      <div onclick="goHome()">Home</div>

    </div>
  </div>

  <div class="video-container">

      <div class="action-buttons">
        <button class="main-btn" onclick="addToCart()">Add to Cart</button>
        <button class="main-btn" onclick="buyNow()">Buy Now</button>

// URL params
const params = new URLSearchParams(window.location.search);
let src   = params.get("src");
let title = params.get("title");

document.getElementById("videoPlayer").src = src || "";
document.getElementById("videoTitle").textContent = title || "";

let dish = dishInfo[title] || null;
let currentQtys = [];

if(dish){
  document.getElementById("videoDesc").textContent = dish.desc;
  currentQtys = dish.ingredients.map(i => i.qty);
  renderIngredients();
} else if(!title){
  showPreviewPicker();
}

// Preview mode picker
function showPreviewPicker(){
  const html = `
    <div id="previewPicker" style="position:fixed;inset:0;background:rgba(0,0,0,0.55);
      display:flex;align-items:center;justify-content:center;z-index:999;">
      <div style="background:#fff;border-radius:16px;padding:30px 28px;max-width:360px;
        width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.25);font-family:'Poppins',sans-serif;">
        <h3 style="margin:0 0 6px;color:#ff6f61;font-size:18px;">👀 Preview Mode</h3>
        <p style="color:#777;font-size:13px;margin:0 0 18px;">Pick a dish to preview:</p>
        <select id="dishPicker" style="width:100%;padding:10px 12px;border-radius:8px;
          border:1px solid #ddd;font-family:'Poppins',sans-serif;font-size:14px;
          color:#333;outline:none;cursor:pointer;background:#f9f9f9;">
          ${Object.keys(dishInfo).map(d=>`<option value="${d}">${d}</option>`).join("")}
        </select>
        <button onclick="loadPreview()" style="margin-top:14px;width:100%;background:#ff6f61;
          color:white;border:none;padding:11px;border-radius:8px;font-weight:600;
          font-size:15px;cursor:pointer;font-family:'Poppins',sans-serif;">Load Preview</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}

function loadPreview(){
  title = document.getElementById("dishPicker").value;
  document.getElementById("previewPicker").remove();
  dish = dishInfo[title];
  document.getElementById("videoTitle").textContent = title;
  document.getElementById("videoDesc").textContent = dish.desc;
  currentQtys = dish.ingredients.map(i => i.qty);
  renderIngredients();
}

// Render ingredient rows
function renderIngredients(){
  const list = document.getElementById("ingredientsList");
  list.innerHTML = "";
  dish.ingredients.forEach((ing, idx) => {
    const rowCost = (currentQtys[idx] * ing.costPerUnit).toFixed(2);
    const row = document.createElement("div");
    row.className = "ingredient-row";
    row.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="ingredient-name">${ing.name}</div>
        <div class="ingredient-unit">${ing.unit} &nbsp;·&nbsp; ₹${ing.costPerUnit} each</div>
      </div>
      <div class="qty-control">
        <button onclick="changeIngQty(${idx},-1)">−</button>
        <span class="qty-value" id="iqty-${idx}">${currentQtys[idx]}</span>
        <button onclick="changeIngQty(${idx},1)">+</button>
      </div>
      <span class="ingredient-cost" id="icost-${idx}">₹${rowCost}</span>`;
    list.appendChild(row);
  });
  renderCostSummary();
}

function formatQty(val){
  return Number.isInteger(val) ? val : parseFloat(val.toFixed(2));
}

function changeIngQty(idx, delta){
  currentQtys[idx] = Math.max(0, currentQtys[idx] + delta);
  document.getElementById(`iqty-${idx}`).textContent = currentQtys[idx];
  const rowCost = (currentQtys[idx] * dish.ingredients[idx].costPerUnit).toFixed(2);
  document.getElementById(`icost-${idx}`).textContent = `₹${rowCost}`;
  renderCostSummary();
}

// Live cost breakdown
function renderCostSummary(){
  const summary = document.getElementById("costSummary");
  let rows = "";
  let total = 0;
  dish.ingredients.forEach((ing, idx) => {
    const cost = currentQtys[idx] * ing.costPerUnit;
    if(cost > 0){
      total += cost;
      rows += `<div class="cost-row">
        <span>${ing.name} <span style="color:#bbb;font-size:12px">(${currentQtys[idx]} × ${ing.unit})</span></span>
        <span>₹${cost.toFixed(2)}</span>
      </div>`;
    }
  });
  summary.innerHTML = `
    <div class="cost-summary-title"> Ingredient Cost Breakdown</div>
    ${rows || '<div class="cost-row"><span style="color:#aaa">All quantities set to 0</span><span>₹0.00</span></div>'}
    <div class="cost-row total-row">
      <span>Total Estimated Cost</span>
      <span>₹${total.toFixed(2)}</span>
    </div>`;
}

function getIngredientTotal(){
  let t = 0;
  dish.ingredients.forEach((ing, idx) => { t += currentQtys[idx] * ing.costPerUnit; });
  return parseFloat(t.toFixed(2));
}

// Add to cart — saves full ingredient breakdown + total cost
function addToCart(){
  if(!dish){ alert("Dish not found!"); return; }
  const ingredientTotal = getIngredientTotal();
  const ingredientsSnapshot = dish.ingredients.map((ing, idx) => ({
    name: ing.name,
    qty: formatQty(currentQtys[idx]),
    unit: ing.unit,
    cost: parseFloat((currentQtys[idx] * ing.costPerUnit).toFixed(2))
  })).filter(i => i.qty > 0);

  let cart = JSON.parse(localStorage.getItem("cart") || "[]");
  const existing = cart.find(item => item.title === title);
  if(existing){
    existing.qty++;
    existing.ingredientTotal = ingredientTotal;
    existing.ingredients = ingredientsSnapshot;
  } else {
    cart.push({ title, thumb: dish.thumb, ingredientTotal, ingredients: ingredientsSnapshot, qty: 1 });
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  showToast(`✅ ${title} added to cart! Total: ₹${ingredientTotal}`);
}

function buyNow(){
  if(!dish){ alert("Dish not found!"); return; }
  const ingredientTotal = getIngredientTotal();
  localStorage.setItem("order", JSON.stringify([{ title, img: dish.thumb, price: ingredientTotal, qty: 1 }]));
  window.location.href = "buynow.html";
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function goHome(){ window.location.href = "home.html"; }
function goCart(){ window.location.href = "cart.html"; }
</script>
