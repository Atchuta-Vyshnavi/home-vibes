<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HomeVibes — Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --coral: #E8614A;
  --amber: #F5A623;
  --cream: #FDF8F3;
  --charcoal: #1C1C1E;
  --stone: #6B6B6B;
  --soft: #F0EBE3;
  --white: #FFFFFF;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
  --shadow-lg: 0 20px 48px rgba(0,0,0,0.16);
  --radius: 16px;
}

html, body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  -webkit-font-smoothing: antialiased;
}

/* ── NAVBAR ── */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 72px;
  background: var(--white);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  cursor: pointer;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--coral), var(--amber));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--charcoal);
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--soft);
  color: var(--charcoal);
  border: none;
  padding: 8px 16px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
}
.nav-btn:hover { background: #E8E0D8; }

/* ── PAGE LAYOUT ── */
.page {
  max-width: 900px;
  margin: 40px auto 64px;
  padding: 0 24px;
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 24px;
  align-items: start;
}

/* ── SECTION HEADER ── */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--charcoal);
  margin-bottom: 20px;
}
.section-title span {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--stone);
  margin-left: 10px;
}

/* ── CART ITEMS ── */
.cart-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.05);
  transition: box-shadow 0.2s;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}
.cart-item:hover { box-shadow: var(--shadow-md); }

.cart-item img {
  width: 64px; height: 64px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}
.cart-details { flex: 1; min-width: 0; }
.cart-details h4 {
  font-size: 15px;
  font-weight: 600;
  color: var(--charcoal);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cart-details .item-price {
  font-size: 13px;
  color: var(--coral);
  font-weight: 600;
}

.cart-item-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.qty-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}
.qty-btn {
  width: 28px; height: 28px;
  background: var(--soft);
  border: 1.5px solid #E0D8D0;
  border-radius: 7px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  color: var(--charcoal);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.qty-btn:hover { background: var(--coral); border-color: var(--coral); color: white; }
.qty-num {
  min-width: 24px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
}
.remove-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #CCC;
  padding: 5px;
  border-radius: 7px;
  transition: color 0.2s, background 0.2s;
  display: flex; align-items: center;
}
.remove-btn:hover { color: #E55; background: #FEF0F0; }

/* ── EMPTY STATE ── */
.empty-state {
  background: var(--white);
  border-radius: var(--radius);
  padding: 56px 32px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.05);
}
.empty-state svg { opacity: 0.25; margin-bottom: 14px; }
.empty-state p {
  font-size: 15px;
  color: var(--stone);
  margin-bottom: 20px;
}
.empty-browse {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--coral);
  color: white;
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.empty-browse:hover { opacity: 0.9; }

/* ── ORDER SUMMARY ── */
.summary-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.05);
  overflow: hidden;
  position: sticky;
  top: 92px;
}
.summary-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--soft);
}
.summary-header h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--charcoal);
}
.summary-body {
  padding: 16px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  font-size: 13.5px;
  color: var(--stone);
}
.summary-row .s-val { color: var(--charcoal); font-weight: 500; }
.summary-divider { height: 1px; background: var(--soft); }
.summary-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.summary-total span:first-child {
  font-size: 14px;
  font-weight: 600;
  color: var(--charcoal);
}
.summary-total span:last-child {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--coral);
}
.summary-footer {
  padding: 0 22px 20px;
}
.checkout-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--coral), #C94B35);
  color: white;
  border: none;
  padding: 13px;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.checkout-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--charcoal);
  color: white;
  padding: 12px 22px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
  box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 720px) {
  .navbar { padding: 0 16px; }
  .page { grid-template-columns: 1fr; margin: 24px auto 48px; padding: 0 16px; }
  .summary-card { position: static; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo" onclick="goHome()">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="2" x2="8" y2="12"/><path d="M5 2v4a3 3 0 0 0 6 0V2"/><line x1="8" y1="12" x2="8" y2="22"/>
        <line x1="16" y1="2" x2="16" y2="22"/>
      </svg>
    </div>
    <span class="logo-text">HomeVibes</span>
  </div>
  <button class="nav-btn" onclick="goHome()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to Menu
  </button>
</nav>

<!-- PAGE -->
<div class="page">

  <!-- Left: Items -->
  <div>
    <div class="section-title">Your Cart <span id="itemCount"></span></div>
    <div class="cart-list" id="cartList"></div>
  </div>

  <!-- Right: Summary -->
  <div class="summary-card" id="summaryCard">
    <div class="summary-header">
      <h3>Order Summary</h3>
    </div>
    <div class="summary-body" id="summaryBody"></div>
    <div class="summary-footer">
      <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function renderCart() {
  const items = JSON.parse(localStorage.getItem('cart') || '[]');
  const list  = document.getElementById('cartList');
  const count = document.getElementById('itemCount');
  list.innerHTML = '';

  if (items.length === 0) {
    count.textContent = '';
    list.innerHTML = `
      <div class="empty-state">
        <svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <p>Your cart is empty</p>
        <button class="empty-browse" onclick="goHome()">
          Browse Menu →
        </button>
      </div>`;
    document.getElementById('summaryBody').innerHTML =
      `<p style="font-size:13px;color:var(--stone);text-align:center;padding:8px 0">No items yet</p>`;
    return;
  }

  let subtotal = 0;
  let totalQty = 0;
  items.forEach((it, i) => {
    const lineTotal = (it.price * it.qty);
    subtotal += lineTotal;
    totalQty += it.qty;
    list.innerHTML += `
      <div class="cart-item">
        <img src="${it.img}" alt="${it.title}">
        <div class="cart-details">
          <h4>${it.title}</h4>
          <div class="item-price">₹${lineTotal.toFixed(2)} <span style="font-weight:400;color:var(--stone);">(₹${it.price} × ${it.qty})</span></div>
        </div>
        <div class="cart-item-right">
          <div class="qty-controls">
            <button class="qty-btn" onclick="updateQty(${i}, -1)">−</button>
            <span class="qty-num">${it.qty}</span>
            <button class="qty-btn" onclick="updateQty(${i}, 1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem(${i})">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
      </div>`;
  });

  count.textContent = `· ${totalQty} item${totalQty !== 1 ? 's' : ''}`;

  // Summary
  const delivery = subtotal > 0 ? 40 : 0;
  document.getElementById('summaryBody').innerHTML = `
    <div class="summary-row">
      <span>Subtotal</span>
      <span class="s-val">₹${subtotal.toFixed(2)}</span>
    </div>
    <div class="summary-row">
      <span>Delivery</span>
      <span class="s-val">₹${delivery.toFixed(2)}</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-total">
      <span>Total</span>
      <span>₹${(subtotal + delivery).toFixed(2)}</span>
    </div>`;
}

function updateQty(i, change) {
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  cart[i].qty += change;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function removeItem(i) {
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  cart.splice(i, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function checkout() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  if (cart.length === 0) { showToast('Your cart is empty!'); return; }
  showToast('✓ Order placed successfully!');
  localStorage.removeItem('cart');
  setTimeout(() => { renderCart(); }, 1200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function goHome() { window.location.href = 'home.html'; }

window.onload = renderCart;
</script>
</body>
</html>
