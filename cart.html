<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HomeVibes — Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/cart.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo" onclick="goHome()">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="2" x2="8" y2="12"/><path d="M5 2v4a3 3 0 0 0 6 0V2"/><line x1="8" y1="12" x2="8" y2="22"/>
        <line x1="16" y1="2" x2="16" y2="22"/>
      </svg>
    </div>
    <span class="logo-text">HomeVibes</span>
  </div>
  <button class="nav-btn" onclick="goHome()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to Menu
  </button>
</nav>

<!-- PAGE -->
<div class="page">

  <!-- Left: Items -->
  <div>
    <div class="section-title">Your Cart <span id="itemCount"></span></div>
    <div class="cart-list" id="cartList"></div>
  </div>

  <!-- Right: Summary -->
  <div class="summary-card" id="summaryCard">
    <div class="summary-header">
      <h3>Order Summary</h3>
    </div>
    <div class="summary-body" id="summaryBody"></div>
    <div class="summary-footer">
      <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="js/cart.js"></script>

</body>
</html>
