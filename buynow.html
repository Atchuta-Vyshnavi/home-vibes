<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HomeVibes — Order Confirmed</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/buynow.css">
</head>
<body>

<div class="card" id="card">

  <!-- Success Header -->
  <div class="success-header">
    <div class="tick-wrap">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Order Confirmed!</h2>
    <p>Thank you for your purchase.</p>
  </div>

  <!-- Card Body -->
  <div class="card-body">

    <!-- Delivery notice -->
    <div style="display:flex;align-items:center;gap:8px;background:var(--soft);border-radius:10px;padding:7px 10px;margin-bottom:10px;font-size:12px;color:var(--stone);border:1px solid rgba(0,0,0,0.04);">
      <span style="font-size:15px;">🚚</span>
      <span>Fresh ingredients are on their way to your doorstep!</span>
    </div>

    <!-- Items List (rendered by JS) -->
    <div id="itemsList"></div>

    <!-- Order Details -->
    <div class="order-details">
      <div class="divider"></div>
      <div class="detail-row">
        <span class="label">Subtotal</span>
        <span class="value">₹<span id="dishSubtotal">—</span></span>
      </div>
      <div class="divider"></div>
      <div class="detail-row">
        <span class="label">Delivery Charges</span>
        <span class="value" id="deliveryLabel">₹20.00</span>
      </div>
      <div class="divider" id="codFeeDiv" style="display:none;"></div>
      <div class="detail-row" id="codFeeRow" style="display:none;">
        <span class="label">COD Handling Fee</span>
        <span class="value">₹10.00</span>
      </div>
    </div>

    <!-- Total -->
    <div class="total-row">
      <span>Total Paid</span>
      <span>₹<span id="dishTotal">—</span></span>
    </div>

    <!-- Button -->
    <button class="action-btn" onclick="goHome()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Back to Home
    </button>

    <!-- Countdown -->
    <div class="countdown-wrap">
      <div class="countdown-text">Redirecting in <span id="timer">5</span> seconds…</div>
      <div class="countdown-bar-track">
        <div class="countdown-bar"></div>
      </div>
    </div>

  </div>
</div>

<script src="js/buynow.js"></script>

</body>
</html>
