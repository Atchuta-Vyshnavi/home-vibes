<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HomeVibes — Order Confirmed</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --coral: #E8614A;
  --amber: #F5A623;
  --cream: #FDF8F3;
  --charcoal: #1C1C1E;
  --stone: #6B6B6B;
  --soft: #F0EBE3;
  --white: #FFFFFF;
  --shadow-lg: 0 20px 48px rgba(0,0,0,0.16);
  --radius: 20px;
}

html, body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(145deg, #1C1C1E 0%, #2D2D30 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow: hidden;
}

/* Background glows */
body::before {
  content: '';
  position: fixed;
  top: -100px; right: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(232,97,74,0.22) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -100px; left: -60px;
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(245,166,35,0.18) 0%, transparent 70%);
  pointer-events: none;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 440px;
  overflow: hidden;
  animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
  position: relative;
  z-index: 1;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeOut {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(0.94); }
}

/* ── SUCCESS HEADER ── */
.success-header {
  background: linear-gradient(135deg, #1C1C1E, #2D2D30);
  padding: 24px 28px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.success-header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(232,97,74,0.3), transparent 70%);
}

.tick-wrap {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--coral), #C94B35);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  box-shadow: 0 6px 18px rgba(232,97,74,0.4);
}
@keyframes pop {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.tick-wrap svg { color: white; }

.success-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: white;
  margin-bottom: 4px;
}
.success-header p {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
}

/* ── CARD BODY ── */
.card-body {
  padding: 20px 22px 18px;
}

/* Dish Row */
.dish-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--soft);
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 14px;
  border: 1px solid rgba(0,0,0,0.04);
}
.dish-row img {
  width: 52px; height: 52px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
}
.dish-info h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--charcoal);
  margin-bottom: 3px;
}
.dish-info span {
  font-size: 12px;
  color: var(--stone);
}

/* Order Details */
.order-details {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13.5px;
}
.detail-row .label { color: var(--stone); }
.detail-row .value { font-weight: 500; color: var(--charcoal); }

.divider {
  height: 1px;
  background: var(--soft);
  margin: 2px 0;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: linear-gradient(135deg, rgba(232,97,74,0.07), rgba(245,166,35,0.07));
  border-radius: 10px;
  border: 1px solid rgba(232,97,74,0.12);
  margin-bottom: 14px;
}
.total-row span:first-child {
  font-size: 13px;
  font-weight: 600;
  color: var(--charcoal);
}
.total-row span:last-child {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--coral);
}

/* Actions */
.action-btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, var(--coral), #C94B35);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 12px;
}
.action-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* Countdown */
.countdown-wrap {
  text-align: center;
}
.countdown-text {
  font-size: 12px;
  color: var(--stone);
}
.countdown-bar-track {
  height: 3px;
  background: var(--soft);
  border-radius: 2px;
  margin-top: 7px;
  overflow: hidden;
}
.countdown-bar {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, var(--coral), var(--amber));
  border-radius: 2px;
  transform-origin: left;
  animation: shrink 5s linear forwards;
}
@keyframes shrink {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}
</style>
</head>
<body>

<div class="card" id="card">

  <!-- Success Header -->
  <div class="success-header">
    <div class="tick-wrap">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Order Confirmed!</h2>
    <p>Thank you for your purchase.</p>
  </div>

  <!-- Card Body -->
  <div class="card-body">

    <!-- Dish -->
    <div class="dish-row">
      <img id="dishImg" src="" alt="Dish">
      <div class="dish-info">
        <h3 id="dishTitle">—</h3>
        <span>Your order has been placed. Fresh ingredients are on their way to your doorstep! 🚚</span>
      </div>
    </div>

    <!-- Order Details -->
    <!-- <div class="order-details">
      <div class="detail-row">
        <span class="label">Unit Price</span>
        <span class="value">₹<span id="dishPrice">—</span></span>
      </div>
      <div class="divider"></div>
      <div class="detail-row">
        <span class="label">Quantity</span>
        <span class="value" id="dishQty">—</span>
      </div>
    </div> -->
    <!-- Order Details -->
    <div class="order-details">
      <div class="detail-row">
        <span class="label">Unit Price</span>
        <span class="value">₹<span id="dishPrice">—</span></span>
      </div>
      <div class="divider"></div>
      <div class="detail-row">
        <span class="label">Quantity</span>
        <span class="value" id="dishQty">—</span>
      </div>
      <div class="divider"></div>
      <div class="detail-row">
        <span class="label">Subtotal</span>
        <span class="value">₹<span id="dishSubtotal">—</span></span>
      </div>
      <div class="divider"></div>
      <div class="detail-row">
        <span class="label">Delivery Charges</span>
        <span class="value">₹40.00</span>
      </div>
    </div>

    <!-- Total -->
    <div class="total-row">
      <span>Total Paid</span>
      <span>₹<span id="dishTotal">—</span></span>
    </div>

    <!-- Total
    <div class="total-row">
      <span>Total Paid</span>
      <span>₹<span id="dishTotal">—</span></span>
    </div> -->

    <!-- Button -->
    <button class="action-btn" onclick="goHome()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Back to Home
    </button>

    <!-- Countdown -->
    <div class="countdown-wrap">
      <div class="countdown-text">Redirecting in <span id="timer">5</span> seconds…</div>
      <div class="countdown-bar-track">
        <div class="countdown-bar"></div>
      </div>
    </div>

  </div>
</div>

<script>
const order = JSON.parse(localStorage.getItem('order') || '[]');
if (order.length) {
  const item = order[0];
  document.getElementById('dishImg').src            = item.img;
  document.getElementById('dishTitle').textContent  = item.title;
  // document.getElementById('dishPrice').textContent  = item.price;
  // document.getElementById('dishQty').textContent    = item.qty;
  // document.getElementById('dishTotal').textContent  = (item.price * item.qty).toFixed(2);
  const subtotal = item.price * item.qty;
  document.getElementById('dishPrice').textContent    = parseFloat(item.price).toFixed(2);
  document.getElementById('dishQty').textContent      = item.qty;
  document.getElementById('dishSubtotal').textContent = subtotal.toFixed(2);
  document.getElementById('dishTotal').textContent    = (subtotal + 40).toFixed(2);
} else {
  document.body.innerHTML = "<h2 style='color:rgba(255,255,255,0.6);text-align:center;font-family:DM Sans,sans-serif;'>No order found.</h2>";
}

function goHome() {
  const card = document.getElementById('card');
  card.style.animation = 'fadeOut 0.5s cubic-bezier(0.4,0,0.2,1) forwards';
  setTimeout(() => window.location.href = 'home.html', 500);
}

let timeLeft = 5;
const timerEl = document.getElementById('timer');
const countdown = setInterval(() => {
  timeLeft--;
  timerEl.textContent = timeLeft;
  if (timeLeft <= 0) { clearInterval(countdown); goHome(); }
}, 1000);
</script>

</body>
</html>
